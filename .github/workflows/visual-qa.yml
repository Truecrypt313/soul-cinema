name: Visual QA Screenshots

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional public URL to screenshot. Leave empty to build and preview this repository locally."
        required: false
        default: ""

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  screenshots:
    name: Capture website screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install --no-save @playwright/test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build local app
        if: ${{ github.event.inputs.target_url == '' }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'visual-qa-placeholder-key' }}
        run: npm run build

      - name: Start local preview server
        if: ${{ github.event.inputs.target_url == '' }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'visual-qa-placeholder-key' }}
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then
              echo "BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready. Logs:"
          cat preview.log
          exit 1

      - name: Use public target URL
        if: ${{ github.event.inputs.target_url != '' }}
        run: echo "BASE_URL=${{ github.event.inputs.target_url }}" >> "$GITHUB_ENV"

      - name: Run visual screenshot tests
        run: npx playwright test tests/visual/screenshot.spec.ts --reporter=list

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soul-cinema-visual-qa
          path: |
            visual-results/**/*.png
            preview.log
          if-no-files-found: warn
          retention-days: 14
