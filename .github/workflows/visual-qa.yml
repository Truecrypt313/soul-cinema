name: Visual QA Screenshots

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional public URL to screenshot. Leave empty to use the local preview build."
        required: false
        default: ""

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  LOCAL_BASE_URL: "http://127.0.0.1:4173"
  VITE_SUPABASE_URL: "https://example.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "visual-qa-placeholder-key"

jobs:
  screenshots:
    name: Capture website screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install --no-save @playwright/test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build local app
        run: npm run build

      - name: Start local preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..60}; do
            if curl -fsS "$LOCAL_BASE_URL" >/dev/null; then
              echo "Local preview is ready at $LOCAL_BASE_URL"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not become ready. Logs:"
          cat preview.log || true
          exit 1

      - name: Resolve screenshot target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "BASE_URL=${{ github.event.inputs.target_url }}" >> "$GITHUB_ENV"
            echo "Using public target URL with local fallback: ${{ github.event.inputs.target_url }}"
          else
            echo "BASE_URL=$LOCAL_BASE_URL" >> "$GITHUB_ENV"
            echo "Using local preview URL: $LOCAL_BASE_URL"
          fi

      - name: Run visual screenshot tests
        env:
          LOCAL_BASE_URL: ${{ env.LOCAL_BASE_URL }}
        run: npx playwright test tests/visual/screenshot.spec.ts --reporter=list

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soul-cinema-visual-qa
          path: |
            visual-results/**/*
            preview.log
          if-no-files-found: warn
          retention-days: 14
